

version: 2

models:
    - name: department_raw
      description: "dbt model to create initial department table in bronze"
      columns:
          - name: "(STORE_ID||DEPT_ID)"
            description: "The primary keys for this table"
            tests:
                - unique
                - not_null
    - name: store_raw
      description: "initial store table in bronze"
      columns:
         - name: "(STORE_ID)"
           description: "Primary key"
           tests: 
              - unique
              - not_null


sources:
    - name: department_data
      database: MYDB
      schema: PUBLIC
      tables:
        - name: DIM_DEPARTMENT_RAW
    - name: store_data
      database: MYDB
      schema: PUBLIC
      tables:
        - name: DIM_STORES_RAW
